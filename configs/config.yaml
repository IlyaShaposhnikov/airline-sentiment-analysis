# DATA LOADING
data:
  path: "data/Tweets.csv"
  target_column: "airline_sentiment"
  text_column: "text"
  confidence_columns:
    sentiment: "airline_sentiment_confidence"
    reason: "negativereason_confidence"
  confidence_threshold: 0.7  # Range: [0.0, 1.0]

# TEXT PREPROCESSING
preprocessing:
  vectorizer:
    type: "tfidf"  # or "count"
    max_features: 2000
    ngram_range: [1, 2]
    lowercase: true
    stop_words: null  # or "english"
  
  cleaning:
    lowercase: true
    remove_urls: true
    remove_mentions: true
    remove_special_chars: true  # Except !?. (handled in code)
    remove_extra_whitespace: true
  
  nlp:
    lemmatize: false  # Requires nltk
    remove_stopwords: false  # Stopwords may carry sentiment in tweets

# MODEL CONFIGURATION
model:
  type: "logistic_regression"  # Currently only this is supported
  training:
    random_state: 42
    max_iter: 500  # Positive integer; increase if convergence warnings occur
    class_weight: "balanced"  # or "none"
    use_confidence_weights: true  # Use sample_weight=confidence
  
  # Solver/penalty: see sklearn docs for valid combinations
  # IMPORTANT: Not all solver/penalty combinations are valid:
  #   • solver="lbfgs": supports penalty="l2" or "none" (default, good for multiclass)
  #   • solver="liblinear": supports penalty="l1" or "l2" (good for small datasets)
  #   • solver="saga": supports penalty="l1", "l2", or "elasticnet" (supports l1 + large datasets)
  #   • penalty="elasticnet": requires solver="saga" and l1_ratio parameter
  # See: https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.LogisticRegression.html
  regularization:
    solver: "lbfgs"  # Options: "lbfgs", "liblinear", "saga"
    penalty: "l2"    # Options: "l2", "l1", "elasticnet", "none"
    C: 1.0           # Inverse regularization strength
    l1_ratio: 0.5    # Only used when penalty="elasticnet", range [0.0, 1.0]
  artifacts:
    path: "artifacts/model_bundle.joblib"
    auto_save: true

# EVALUATION & METRICS
evaluation:
  split:
    test_size: 0.25  # Range: (0.0, 1.0)
    stratify: true  # Preserve class distribution
  
  metrics:
    primary: ["accuracy", "f1_macro", "f1_weighted", "roc_auc_ovo"]
  
  reporting:
    include_confusion_matrix: true
    include_classification_report: true
    export_formats: ["json", "csv"]
    
    plot_settings:
      normalize: true  # Show rates instead of counts
      cmap: "Blues"
      figsize: [8, 6]
    
    misclassified_examples:
      n_top: 10
      include_text: true

# INTERPRETABILITY
interpretability:
  weight_based:
    top_words_threshold: 2.0  # Show words with |weight| > threshold
    n_top_features: 20
  
  shap:
    enabled: false  # Requires shap package
    background_samples: 100
    random_state: 42  # For reproducible plots
  
  plot_settings:
    horizontal: true  # Horizontal bar chart for feature importance
    figsize: [10, 8]

# SERVING / DASHBOARD
serving:
  api:
    enabled: true
    host: "0.0.0.0"
    port: 8000
    endpoint: "/predict"
    log_level: "INFO"
    rate_limit_per_minute: 60
    cors_origins: ["*"]
    limits:
      max_text_length: 1000
      max_batch_size: 100
      min_explain_count: 1
      max_explain_count: 20
      max_request_size_mb: 10
  
  dashboard:
    enabled: false
    title: "Airline Sentiment Predictor"
    framework: "streamlit"  # or "gradio"