# Data
data_path: "data/Tweets.csv"
target_column: "airline_sentiment"
text_column: "text"
confidence_columns:
  sentiment: "airline_sentiment_confidence"
  reason: "negativereason_confidence"
confidence_threshold: 0.7  # Range: [0.0, 1.0]

# Preprocessing
vectorizer: "tfidf"  # or "count"
max_features: 2000
ngram_range: [1, 2]
lowercase: true
remove_urls: true
remove_mentions: false  # Separate @airline from @user mentions
remove_special_chars: true  # Remove punctuation except !?. (handled in clean_text)
remove_extra_whitespace: true  # Collapse multiple spaces
remove_stopwords: false  # For tweets, stopwords may carry sentiment signal
lemmatize: false  # Set true to enable lemmatization (requires nltk)

# Model
model_type: "logistic_regression"
max_iter: 500
class_weight: "balanced"  # or "none"
use_confidence_weights: true  # Use sample_weight=confidence in fit()

# Evaluation
random_state: 42
test_size: 0.25
metrics: ["accuracy", "f1_macro", "f1_weighted", "roc_auc_ovo"]

# Interpretability
top_words_threshold: 2.0  # Show words with |weight| > threshold
use_shap: false  # Set true to enable SHAP (slower)

# API / Dashboard
api_port: 8000
dashboard_title: "Airline Sentiment Predictor"