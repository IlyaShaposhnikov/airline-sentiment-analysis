# Data
data_path: "data/Tweets.csv"
target_column: "airline_sentiment"
text_column: "text"
confidence_columns:
  sentiment: "airline_sentiment_confidence"
  reason: "negativereason_confidence"
confidence_threshold: 0.7  # Range: [0.0, 1.0]

# Preprocessing
vectorizer: "tfidf"  # or "count"
max_features: 2000
ngram_range: [1, 2]
lowercase: true
remove_urls: true
remove_mentions: false  # Separate @airline from @user mentions
remove_special_chars: true  # Remove punctuation except !?. (handled in clean_text)
remove_extra_whitespace: true  # Collapse multiple spaces
remove_stopwords: false  # For tweets, stopwords may carry sentiment signal
lemmatize: false  # Set true to enable lemmatization (requires nltk)

# Model
model_type: "logistic_regression"
max_iter: 500
class_weight: "balanced"  # or "none"
use_confidence_weights: true  # Use sample_weight=confidence in fit()

# Solver/penalty configuration for LogisticRegression
# IMPORTANT: Not all solver/penalty combinations are valid:
#   • solver="lbfgs": supports penalty="l2" or "none" (default, good for multiclass)
#   • solver="liblinear": supports penalty="l1" or "l2" (good for small datasets)
#   • solver="saga": supports penalty="l1", "l2", or "elasticnet" (supports l1 + large datasets)
#   • penalty="elasticnet": requires solver="saga" and l1_ratio parameter
# See: https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.LogisticRegression.html
solver: "lbfgs"  # or "liblinear", "saga"
penalty: "l2"  # or "l1", "elasticnet"
C: 1.0  # Inverse regularization strength. Smaller = stronger regularization
l1_ratio: 0.5  # Only used when penalty="elasticnet". Range: [0.0, 1.0] (0=L2, 1=L1)

# Metrics / Reporting
metrics_config:
  include_confusion_matrix: true
  include_classification_report: true
  export_formats: ["json", "csv"]  # Options: json, csv
  plot_settings:
    normalize: true  # Show rates instead of counts
    cmap: "Blues"  # Matplotlib colormap
    figsize: [8, 6]  # inches
  top_misclassified:
    n_top: 10  # Number of examples to extract
    include_text: true # Include original text in report

# Evaluation
random_state: 42
test_size: 0.25
metrics: ["accuracy", "f1_macro", "f1_weighted", "roc_auc_ovo"]

# Interpretability
top_words_threshold: 2.0  # Show words with |weight| > threshold
use_shap: false  # Set true to enable SHAP (slower)

# API / Dashboard
api_port: 8000
dashboard_title: "Airline Sentiment Predictor"